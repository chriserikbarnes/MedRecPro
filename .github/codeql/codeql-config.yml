name: "MedRecPro CodeQL Configuration"

# Use the default query suite as baseline
# query-filters below suppress confirmed false positives from the 2026-03-03 security scan

query-filters:
  # ── cs/log-forging (228 alerts) ──────────────────────────────────────
  # All instances use ASP.NET Core structured logging with named
  # placeholders ({Param}). Parameters are captured as structured data,
  # never interpolated into the message template. The framework prevents
  # newline injection and log forging by design.
  - exclude:
      id: cs/log-forging

  # ── cs/exposure-of-sensitive-information (44 alerts) ─────────────────
  # All instances write email/user data to internal ILogger<T> for
  # authentication diagnostics and user resolution debugging. Emails
  # are never returned in HTTP responses — API responses contain only
  # encrypted user IDs.
  - exclude:
      id: cs/exposure-of-sensitive-information

  # ── cs/user-controlled-bypass (18 alerts) ────────────────────────────
  # Flagged lines are input validation of pagination/request parameters,
  # not authorization gates. Authorization is enforced independently via
  # [Authorize] policy, claims extraction, and role verification in
  # separate #region authorization blocks.
  - exclude:
      id: cs/user-controlled-bypass

  # ── cs/cleartext-storage-of-sensitive-information (4 alerts) ─────────
  # Flagged lines are log statements, not storage operations. Passwords
  # are hashed via IPasswordHasher<User> before database storage and
  # cleared from memory afterward (user.Password = null).
  - exclude:
      id: cs/cleartext-storage-of-sensitive-information

  # ── cs/web/unvalidated-url-redirection (2 alerts) ───────────────────
  # returnUrl is validated upstream by getValidatedReturnUrl() which
  # enforces a domain allowlist (medrecpro.com, medrec.pro, localhost)
  # and rejects unrecognized hosts, falling back to ~/swagger/.
  - exclude:
      id: cs/web/unvalidated-url-redirection

  # ── js/unsafe-jquery-plugin (2 alerts) ──────────────────────────────
  # Third-party library code (jquery-validation v1.19.5). Selectors
  # operate on form control attributes, not raw user input.
  - exclude:
      id: js/unsafe-jquery-plugin

  # ── js/insecure-randomness (2 alerts) ──────────────────────────────
  # Math.random() used for UI message/conversation IDs only, not
  # security tokens or authentication. Cryptographic randomness is
  # not required for these use cases.
  - exclude:
      id: js/insecure-randomness

  # ── js/redos (1 alert) ─────────────────────────────────────────────
  # Regex alternation branches have different literal prefixes (<div
  # vs <p), making them unambiguous. Input is application-rendered
  # HTML, not arbitrary user input.
  - exclude:
      id: js/redos
