name: MCP Endpoint Health Check

on:
  schedule:
    # Weekdays 8 AM – 6 PM EST (1 PM – 11 PM UTC)
    - cron: '0 13-23 * * 1-5'
    # Weekdays 7 PM EST (midnight UTC next day)
    - cron: '0 0 * * 2-6'
  workflow_dispatch:

permissions: {}

env:
  # Worker proxy URL (set via secret so the workers.dev subdomain stays private)
  # Format: https://medrecpro-health-proxy.<subdomain>.workers.dev
  PROXY_BASE_URL: ${{ secrets.HEALTH_PROXY_URL }}

jobs:
  health-check:
    name: MCP Endpoint Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ────────────────────────────────────────────────
      # Integrity: Verify workflow has not been tampered with
      # ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify workflow integrity
        id: integrity
        env:
          EXPECTED_HASH: ${{ secrets.WORKFLOW_INTEGRITY_HASH }}
        run: |
          if [ -z "$EXPECTED_HASH" ]; then
            echo "::error::WORKFLOW_INTEGRITY_HASH secret is not set"
            exit 1
          fi

          ACTUAL_HASH=$(sha256sum .github/workflows/mcp-health-check.yml | awk '{print $1}')
          echo "Expected: $EXPECTED_HASH"
          echo "Actual:   $ACTUAL_HASH"

          if [ "$ACTUAL_HASH" != "$EXPECTED_HASH" ]; then
            echo "::error::Workflow file integrity check FAILED — file may have been tampered with"
            exit 1
          fi

          echo "Integrity check passed"

      # ────────────────────────────────────────────────
      # Step 0: MCP Server Liveness (free, fast-fail gate)
      # ────────────────────────────────────────────────
      - name: Check MCP server health
        id: health
        if: steps.integrity.outcome == 'success'
        env:
          CF_BYPASS_TOKEN: ${{ secrets.CF_HEALTH_CHECK_TOKEN }}
        run: |
          echo "Checking MCP server health..."
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 \
            -H "User-Agent: MedRecPro-HealthCheck/1.0" \
            -H "Cache-Control: no-cache" \
            -H "X-Health-Token: $CF_BYPASS_TOKEN" \
            "$PROXY_BASE_URL/mcp/health")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::MCP health endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

          STATUS=$(echo "$BODY" | jq -r '.status // empty')
          if [ "$STATUS" != "running" ]; then
            echo "::error::MCP server status is '$STATUS', expected 'running'"
            exit 1
          fi

          VERSION=$(echo "$BODY" | jq -r '.version // "unknown"')
          echo "MCP server is running (v$VERSION)"

      # ────────────────────────────────────────────────
      # Step 1: search_drug_labels (direct REST API)
      # ────────────────────────────────────────────────
      - name: Test search_drug_labels
        id: search_labels
        if: steps.integrity.outcome == 'success' && steps.health.outcome == 'success'
        env:
          CF_BYPASS_TOKEN: ${{ secrets.CF_HEALTH_CHECK_TOKEN }}
        run: |
          echo "Testing search_drug_labels..."

          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 \
            -H "User-Agent: MedRecPro-HealthCheck/1.0" \
            -H "Cache-Control: no-cache" \
            -H "X-Health-Token: $CF_BYPASS_TOKEN" \
            "$PROXY_BASE_URL/api/Label/product/latest/details?productNameSearch=aspirin&pageSize=1")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::search_drug_labels returned HTTP $HTTP_CODE"
            echo "$BODY" | head -c 500
            exit 1
          fi

          if ! echo "$BODY" | jq . > /dev/null 2>&1; then
            echo "::error::Response is not valid JSON"
            echo "$BODY" | head -c 500
            exit 1
          fi

          # Check for app-level error (response may be an array or object)
          if echo "$BODY" | jq -e 'type == "object" and has("error")' > /dev/null 2>&1; then
            APP_MSG=$(echo "$BODY" | jq -r '"\(.error) — \(.message // "No details")"')
            echo "::error::Application error: $APP_MSG"
            exit 1
          fi

          echo "search_drug_labels: PASS"

      # ────────────────────────────────────────────────
      # Step 2: export_drug_label_markdown (product list)
      # ────────────────────────────────────────────────
      - name: Test export_drug_label_markdown
        id: export_label
        if: steps.integrity.outcome == 'success' && steps.health.outcome == 'success'
        env:
          CF_BYPASS_TOKEN: ${{ secrets.CF_HEALTH_CHECK_TOKEN }}
        run: |
          echo "Testing export_drug_label_markdown (product list)..."

          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 \
            -H "User-Agent: MedRecPro-HealthCheck/1.0" \
            -H "Cache-Control: no-cache" \
            -H "X-Health-Token: $CF_BYPASS_TOKEN" \
            "$PROXY_BASE_URL/api/Label/product/latest?productNameSearch=aspirin&pageSize=1")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::export_drug_label_markdown returned HTTP $HTTP_CODE"
            echo "$BODY" | head -c 500
            exit 1
          fi

          if ! echo "$BODY" | jq . > /dev/null 2>&1; then
            echo "::error::Response is not valid JSON"
            echo "$BODY" | head -c 500
            exit 1
          fi

          # Check for app-level error (response may be an array or object)
          if echo "$BODY" | jq -e 'type == "object" and has("error")' > /dev/null 2>&1; then
            APP_MSG=$(echo "$BODY" | jq -r '"\(.error) — \(.message // "No details")"')
            echo "::error::Application error: $APP_MSG"
            exit 1
          fi

          echo "export_drug_label_markdown: PASS"

      # ────────────────────────────────────────────────
      # Step 3: search_expiring_patents (direct REST API)
      # ────────────────────────────────────────────────
      - name: Test search_expiring_patents
        id: search_patents
        if: steps.integrity.outcome == 'success' && steps.health.outcome == 'success'
        env:
          CF_BYPASS_TOKEN: ${{ secrets.CF_HEALTH_CHECK_TOKEN }}
        run: |
          echo "Testing search_expiring_patents..."

          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 \
            -H "User-Agent: MedRecPro-HealthCheck/1.0" \
            -H "Cache-Control: no-cache" \
            -H "X-Health-Token: $CF_BYPASS_TOKEN" \
            "$PROXY_BASE_URL/api/OrangeBook/expiring?tradeName=Lipitor&pageSize=1")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::search_expiring_patents returned HTTP $HTTP_CODE"
            echo "$BODY" | head -c 500
            exit 1
          fi

          if ! echo "$BODY" | jq . > /dev/null 2>&1; then
            echo "::error::Response is not valid JSON"
            echo "$BODY" | head -c 500
            exit 1
          fi

          # Check for app-level error (response may be an array or object)
          if echo "$BODY" | jq -e 'type == "object" and has("error")' > /dev/null 2>&1; then
            APP_MSG=$(echo "$BODY" | jq -r '"\(.error) — \(.message // "No details")"')
            echo "::error::Application error: $APP_MSG"
            exit 1
          fi

          echo "search_expiring_patents: PASS"

      # ────────────────────────────────────────────────
      # Summary
      # ────────────────────────────────────────────────
      - name: Health check summary
        if: always()
        run: |
          echo "=== MCP Health Check Summary ==="
          echo "Workflow integrity:         ${{ steps.integrity.outcome }}"
          echo "Server health:              ${{ steps.health.outcome }}"
          echo "search_drug_labels:         ${{ steps.search_labels.outcome }}"
          echo "export_drug_label_markdown: ${{ steps.export_label.outcome }}"
          echo "search_expiring_patents:    ${{ steps.search_patents.outcome }}"
          echo ""

          FAILURES=0
          [ "${{ steps.integrity.outcome }}" != "success" ] && FAILURES=$((FAILURES + 1))
          [ "${{ steps.health.outcome }}" != "success" ] && [ "${{ steps.health.outcome }}" != "skipped" ] && FAILURES=$((FAILURES + 1))
          [ "${{ steps.search_labels.outcome }}" != "success" ] && [ "${{ steps.search_labels.outcome }}" != "skipped" ] && FAILURES=$((FAILURES + 1))
          [ "${{ steps.export_label.outcome }}" != "success" ] && [ "${{ steps.export_label.outcome }}" != "skipped" ] && FAILURES=$((FAILURES + 1))
          [ "${{ steps.search_patents.outcome }}" != "success" ] && [ "${{ steps.search_patents.outcome }}" != "skipped" ] && FAILURES=$((FAILURES + 1))

          if [ "$FAILURES" -gt 0 ]; then
            echo "::error::$FAILURES check(s) failed"
            exit 1
          fi

          echo "All checks passed!"
